<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Estoque Offline</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .form-group { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Cadastro de Produtos e Validade</h2>

    <div class="form-group">
        <input type="text" id="produto" placeholder="Nome do Produto">
        <input type="date" id="validade">
        <button onclick="adicionarProduto()">Adicionar</button>
        <button onclick="exportarCSV()">Baixar Planilha (CSV)</button>
    </div>

    <table id="tabelaProdutos">
        <thead>
            <tr>
                <th>Produto</th>
                <th>Validade</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <script>
        let produtos = JSON.parse(localStorage.getItem('estoque')) || [];

        function renderizar() {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';
            produtos.forEach((item, index) => {
                corpo.innerHTML += `<tr>
                    <td>${item.nome}</td>
                    <td>${item.validade}</td>
                    <td><button onclick="remover(${index})">Remover</button></td>
                </tr>`;
            });
        }

        function adicionarProduto() {
            const nome = document.getElementById('produto').value;
            const validade = document.getElementById('validade').value;
            if(!nome || !validade) return alert("Preencha todos os campos");
            
            produtos.push({ nome, validade });
            localStorage.setItem('estoque', JSON.stringify(produtos));
            renderizar();
        }

        function remover(index) {
            produtos.splice(index, 1);
            localStorage.setItem('estoque', JSON.stringify(produtos));
            renderizar();
        }

        function exportarCSV() {
            let csv = "Produto,Validade\n";
            produtos.forEach(p => csv += `${p.nome},${p.validade}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'estoque.csv');
            a.click();
        }

        renderizar();
    </script>
</body>
</html>
